name: CI

on:
  push:
    branches: [main, dev, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.16"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run smoke
